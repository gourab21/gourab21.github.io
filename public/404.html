<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #e2e8f0;
      }
      .wrap {
        text-align: center;
        padding: 2rem;
      }
      .monkey {
        font-size: 6rem;
        line-height: 1;
        margin-bottom: 1rem;
        animation: doze 2.4s ease-in-out infinite;
        display: inline-block;
      }
      @keyframes doze {
        0%,
        100% {
          transform: rotate(-4deg) translateY(0);
        }
        50% {
          transform: rotate(4deg) translateY(-6px);
        }
      }
      h1 {
        font-size: 1.4rem;
        margin: 0 0 0.5rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #94a3b8;
        font-size: 0.95rem;
      }
    </style>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages serves this file for any path it doesn't recognize
      // (e.g. a direct load or refresh on /publications). Because this is
      // a custom domain serving the site from the root (not a
      // "username.github.io/repo-name" subpath), pathSegmentsToKeep is 0.
      //
      // NOTE: this redirect fires immediately on load, so the visible
      // content below is only ever seen as a brief flash (or if this
      // file is opened directly). Do not remove this script — it's what
      // makes deep links like /publications work on GitHub Pages.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="monkey">🐒💤</div>
      <h1>Gourab is tired and sleeping…</h1>
      <p>His website will be right back. Redirecting you now.</p>
    </div>
  </body>
</html>
